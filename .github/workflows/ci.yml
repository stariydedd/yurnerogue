name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  test-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt pytest
      - name: Run game tests (headless)
        run: pytest tests/ -v
        env:
          SDL_VIDEODRIVER: dummy

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r backend/requirements-dev.txt
      - name: Run backend tests
        run: pytest tests/ -v
        working-directory: backend

  build-web:
    # Проверяем, что WASM-сборка не сломана; артефакт пригодится деплою.
    runs-on: ubuntu-latest
    needs: [lint, test-game]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pygbag
      - name: Build web bundle
        run: python -m pygbag --build game
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: game/build/web/
          retention-days: 7
