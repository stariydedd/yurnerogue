[tool.ruff]
line-length = 120
target-version = "py312"
extend-exclude = ["game/build"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
# Звёздные импорты (from domain.consts import *) — осознанный стиль, унаследованный
# из исходного rogue; констант много и они используются повсеместно.
ignore = ["F403", "F405"]

[tool.ruff.lint.per-file-ignores]
# Тестовый DATABASE_URL должен попасть в env до импорта app.*
"backend/tests/conftest.py" = ["E402"]
# Depends()/Query() в дефолтах аргументов — стандартная идиома FastAPI.
"backend/app/**" = ["B008"]

[tool.pytest.ini_options]
testpaths = ["tests", "backend/tests"]
