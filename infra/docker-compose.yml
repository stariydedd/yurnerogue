services:
  backend:
    build: ../backend
    environment:
      DATABASE_URL: postgresql+psycopg://rogue:${POSTGRES_PASSWORD:-rogue}@db:5432/rogue
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rogue
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rogue}
      POSTGRES_DB: rogue
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rogue -d rogue"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
