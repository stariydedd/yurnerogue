server {
    listen 80;
    server_name yurnerogue.ru www.yurnerogue.ru 194.58.46.226 _;

    # ACME-челленджи certbot (webroot) должны ходить по HTTP.
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    location / {
        return 301 https://yurnerogue.ru$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name yurnerogue.ru www.yurnerogue.ru;

    ssl_certificate     /etc/letsencrypt/live/yurnerogue.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yurnerogue.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000" always;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_types application/wasm application/javascript text/css application/json image/svg+xml;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Бандл игры и страница меняются с каждым деплоем — запрещаем кэш,
    # иначе браузер держит старую версию даже после обновления.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Strict-Transport-Security "max-age=31536000" always;
    }

    location ~ \.(apk|tar\.gz)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Strict-Transport-Security "max-age=31536000" always;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
