server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_types application/wasm application/javascript text/css application/json image/svg+xml;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Бандл игры и страница меняются с каждым деплоем — запрещаем кэш,
    # иначе браузер держит старую версию даже после обновления.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ~ \.(apk|tar\.gz)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
